[[test]]
title = "all"
timeout = 600
convergence_timeout = 120

  [test.network]
  packet_loss_rate = 0.05

  [[test.workload]]
  test_name = "Cluster"
  num_ops = 25
  test_duration = 60.0
  drop_weight = 3

  [[test.workload]]
  test_name = "Query"
  num_queries = 25
  create_duration = 60.0
  drop_fraction = 0.5
  drop_start = 10.0
  drop_duration = 50.0

  [[test.workload]]
  test_name = "Attrition"
  num_ops = 15
  test_duration = 60.0
  kill_rate = 0.4
  restart_delay_lo_secs = 1
  restart_delay_hi_secs = 5
  kill_coordinator = true

  [[test.workload]]
  test_name = "NetworkPartition"
  num_ops = 15
  test_duration = 60.0
  partition_rate = 0.25
  duration_lo_secs = 2
  duration_hi_secs = 8
