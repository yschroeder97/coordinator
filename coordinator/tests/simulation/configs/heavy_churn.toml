timeout_secs = 600
min_workers = 4

[network]
packet_loss_rate = 0.05

[[workload]]
name = "CrudWorkload"
min_ops = 20
max_ops = 50
max_sleep_secs = 3

[[workload]]
name = "Attrition"
kill_rate = 0.4
kill_interval_secs = 3
restart_delay_lo_secs = 1
restart_delay_hi_secs = 5

[[workload]]
name = "NetworkPartition"
partition_rate = 0.25
duration_lo_secs = 2
duration_hi_secs = 8
